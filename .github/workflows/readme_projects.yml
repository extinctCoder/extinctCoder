name: README Projects

on:
  workflow_dispatch:
  push:
    paths:
      - "resume.yml"
      - "readme/**"
      - "pyproject.toml"
      - ".github/workflows/readme_projects.yml"

concurrency:
  group: repo-writes
  cancel-in-progress: false

jobs:
  update-readme:
    name: Update README projects
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Update README projects
        run: python -m readme

      - name: Commit README
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actor
          add: "README.md"
