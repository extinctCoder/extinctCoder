name: Latest Blog Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: repo-writes
  cancel-in-progress: false

# Your blog/RSS feed. Change this when you fork.
env:
  BLOG_FEED: "https://extinctcoder.github.io/feed.xml"

jobs:
  sync-blog-posts:
    name: Sync latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Update README with latest posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: ${{ env.BLOG_FEED }}
