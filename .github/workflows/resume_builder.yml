name: Résumé Builder

on:
  workflow_dispatch:
  push:
    paths:
      - "resume.yml"
      - "resume/**"
      - "requirements.txt"
      - ".github/workflows/resume_builder.yml"

concurrency:
  group: repo-writes
  cancel-in-progress: false

jobs:
  render:
    name: Render LaTeX templates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render LaTeX templates
        run: python -m resume.builder

      - name: Upload rendered LaTeX
        uses: actions/upload-artifact@v7
        with:
          name: latex-source
          path: resume/output/
          retention-days: 1

  compile:
    name: Compile résumé PDF
    needs: render
    runs-on: ubuntu-latest
    steps:
      - name: Download rendered LaTeX
        uses: actions/download-artifact@v8
        with:
          name: latex-source
          path: resume/output/

      - name: Compile résumé PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume.tex
          working_directory: resume/output/
          args: -pdf -file-line-error -interaction=nonstopmode -jobname=Sabbir_Ahmed_Shourov_resume

      - name: Upload résumé PDF
        uses: actions/upload-artifact@v7
        with:
          name: resume-pdf
          path: resume/output/Sabbir_Ahmed_Shourov_resume.pdf
          retention-days: 1

  publish:
    name: Publish résumé PDF
    needs: compile
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download résumé PDF
        uses: actions/download-artifact@v8
        with:
          name: resume-pdf

      - name: Commit résumé PDF
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actor
          add: "Sabbir_Ahmed_Shourov_resume.pdf"
