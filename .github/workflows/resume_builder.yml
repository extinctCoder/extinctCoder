name: Résumé Builder

on:
  workflow_dispatch:
  push:
    paths:
      - "resume/**"
      - "requirements.txt"
      - ".github/workflows/resume_builder.yml"

jobs:
  build-resume:
    name: Build and publish résumé
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render LaTeX templates
        run: python -m resume.builder

      - name: Compile résumé PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume.tex
          working_directory: resume/output/
          args: -pdf -file-line-error -interaction=nonstopmode -jobname=Sabbir_Ahmed_Shourov_resume

      - name: Move PDF to repository root
        run: mv resume/output/Sabbir_Ahmed_Shourov_resume.pdf Sabbir_Ahmed_Shourov_resume.pdf

      - name: Commit résumé PDF
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actor
          add: "Sabbir_Ahmed_Shourov_resume.pdf"
